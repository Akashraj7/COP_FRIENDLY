<!DOCTYPE html>
<html>
<head>
    <title>Register - Cop Friendly</title>
    <style>
        body { font-family: Arial; background: #f2f2f2; margin: 0; }
        .box {
            width: 350px; margin: 80px auto; padding: 20px;
            background: white; border-radius: 10px; box-shadow: 0 0 10px gray;
        }
        input, select, button {
            width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;
            border: 1px solid #ddd; border-radius: 5px; font-size: 14px;
        }
        button { 
            background: #28a745; color: white; border: none; 
            cursor: pointer; font-weight: bold;
        }
        button:hover { background: #218838; }
        h2 { margin-top: 0; color: #333; }
        p { text-align: center; }
        a { color: #007BFF; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="box">
    <h2>Create Account</h2>
    <form action="/register" method="post">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>
        
        <label><strong>Account Type:</strong></label>
        <select name="role" required>
            <option value="">-- Select Role --</option>
            <option value="citizen">User (Report Complaints)</option>
            <option value="police">Police (Manage Complaints)</option>
        </select>

        <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="/">Login</a></p>
</div>

</body>
</html>
