<!DOCTYPE html>
<html>
<head>
    <title>Login - Cop Friendly</title>
    <style>
        body { font-family: Arial; background: #f2f2f2; }
        .box {
            width: 350px; margin: 100px auto; padding: 20px;
            background: white; border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        input, button {
            width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;
        }
        button { background: #007BFF; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .role-selection {
            margin: 15px 0;
        }
        .role-option {
            margin: 10px 0; display: flex; align-items: center;
        }
        .role-option input { width: auto; margin-right: 10px; }
        .role-option label { cursor: pointer; margin: 0; }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>
    <form action="/login" method="post">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        
        <div class="role-selection">
            <p><strong>Login as:</strong></p>
            <div class="role-option">
                <input type="radio" id="user_role" name="role" value="citizen" checked required>
                <label for="user_role">User (Raise & Track Complaints)</label>
            </div>
            <div class="role-option">
                <input type="radio" id="police_role" name="role" value="police" required>
                <label for="police_role">Police (Manage Complaints)</label>
            </div>
        </div>
        
        <button type="submit">Login</button>
    </form>
    <p>New user? <a href="/register">Register</a></p>
</div>

</body>
</html>
